name: UL Forge CI

on:
  push:
    paths:
      - 'ul-forge/**'
  pull_request:
    paths:
      - 'ul-forge/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ul-forge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ul-forge

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build -p ul-core -p ul-cli -p ul-api -p ul-game

      - name: Test
        run: cargo test -p ul-core -p ul-cli -p ul-api

      - name: Snapshot tests
        run: cargo test -p ul-core --test snapshot_tests

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ul-forge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ul-forge

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build crates/ul-game --target web --out-dir ../../web/wasm-pkg --out-name ul_wasm

  web:
    name: Web Editor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ul-forge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ul-forge
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ul-forge/web/package-lock.json

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build crates/ul-game --target web --out-dir ../../web/wasm-pkg --out-name ul_wasm

      - name: Install
        working-directory: ul-forge/web
        run: npm ci

      - name: Type check
        working-directory: ul-forge/web
        run: npx tsc --noEmit

      - name: Test
        working-directory: ul-forge/web
        run: npm test
