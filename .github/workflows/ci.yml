name: UL Forge CI

on:
  push:
    branches: [main]
    paths:
      - 'ul-forge/**'
  pull_request:
    paths:
      - 'ul-forge/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: ul-forge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ul-forge

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ul-forge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ul-forge

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web crates/ul-wasm

  web:
    name: Web Editor
    needs: wasm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ul-forge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ul-forge
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ul-forge/web/package-lock.json

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web crates/ul-wasm

      - name: Install dependencies
        working-directory: ul-forge/web
        run: npm ci

      - name: Type check
        working-directory: ul-forge/web
        run: npx tsc --noEmit

      - name: Build
        working-directory: ul-forge/web
        run: npm run build

  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ul-forge/vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ul-forge/vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile
